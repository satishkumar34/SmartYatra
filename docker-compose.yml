version: "3.9"

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: voyager_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       smart_tourism
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voyager_api
    restart: unless-stopped
    environment:
      DATABASE_URL:                  postgresql://postgres:postgres@db:5432/smart_tourism
      SECRET_KEY:                    change-this-in-production-use-32-chars-minimum
      ALGORITHM:                     HS256
      ACCESS_TOKEN_EXPIRE_MINUTES:   60
      ENVIRONMENT:                   development
      ALLOWED_ORIGINS:               http://localhost:4200,http://localhost:80
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        alembic upgrade head &&
        python seed.py &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "

  # ── Angular (Nginx for prod) ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voyager_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
