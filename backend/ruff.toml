[tool.ruff]
target-version = "py312"
line-length = 100
exclude = [
    ".venv",
    "alembic/versions",
    "__pycache__",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "S",   # bandit security
    "ANN", # type annotations
]
ignore = [
    "ANN101", # self annotation
    "ANN102", # cls annotation
    "ANN401", # Any type
    "S101",   # assert (used in tests)
    "B008",   # do not perform function calls in default arguments (FastAPI Depends pattern)
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["ANN", "S", "N802"]
"seed.py"  = ["ANN", "S105", "S106"]

[tool.ruff.lint.isort]
known-first-party = ["config", "database", "models", "schemas", "services", "repositories", "routers", "core", "utils", "constants"]
