<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Voyager - Smart Tourism</title>
  <base href="/"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="description" content="Voyager Smart Tourism Platform - discover destinations, book hotels, explore the world."/>
  <meta name="theme-color" content="#10101a"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>V</text></svg>"/>
  <script>
    (function() {
      try {
        var storageKey = 'st_theme';
        var savedTheme = localStorage.getItem(storageKey);
        var systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = savedTheme === 'light' || savedTheme === 'dark'
          ? savedTheme
          : (systemPrefersDark ? 'dark' : 'light');

        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.colorScheme = theme;

        var metaTheme = document.querySelector('meta[name="theme-color"]');
        if (metaTheme) {
          metaTheme.setAttribute('content', theme === 'dark' ? '#10101a' : '#fcf9f1');
        }
      } catch (error) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.documentElement.style.colorScheme = 'dark';
      }
    })();
  </script>
